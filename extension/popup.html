<style>
  body { width: 420px; padding: 12px; font-family: -apple-system, sans-serif; font-size: 13px; }
  h2 { margin: 0 0 8px; font-size: 15px; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .row label { flex: 1; cursor: pointer; }
  button { padding: 6px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
  button.primary { background: #007aff; color: white; border-color: #007aff; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .stats { background: #f5f5f7; padding: 8px; border-radius: 4px; margin: 8px 0; }
  .stats div { margin-bottom: 2px; }
  textarea { width: 100%; box-sizing: border-box; font-family: ui-monospace, monospace; font-size: 12px; }
  .section { border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; }
  .small { font-size: 11px; color: #666; }
  .tag { display: inline-block; background: #e0e7ff; color: #3730a3; border-radius: 3px; padding: 1px 6px; margin-right: 3px; font-size: 11px; }
</style>

      <label><input type="checkbox" class="platform" value="temu" checked> Temu</label>
